tasks:
  start-mysql:
    name: Start MySQL
    description: Start a MySQL 8 container with the database the app expects.
    command: |
      # Reuse running container if healthy
      if docker exec mysql-votingapp mysqladmin ping -h localhost -uroot -proot --silent 2>/dev/null; then
        echo "MySQL is already running."
        exit 0
      fi
      # Remove stale container if present
      docker rm -f mysql-votingapp 2>/dev/null || true
      # Persist data in workspace so it survives restarts
      mkdir -p /workspaces/VotingApp/.mysql-data
      docker run -d \
        --name mysql-votingapp \
        -e MYSQL_ROOT_PASSWORD=root \
        -e MYSQL_DATABASE=zinterview \
        -v /workspaces/VotingApp/.mysql-data:/var/lib/mysql \
        -p 3306:3306 \
        mysql:8.0
      echo "Waiting for MySQL to be ready..."
      until docker exec mysql-votingapp mysqladmin ping -h localhost -uroot -proot --silent 2>/dev/null; do
        sleep 2
      done
      echo "MySQL is ready."
    triggeredBy:
      - postDevcontainerStart

  start-mailhog:
    name: Start MailHog
    description: Start MailHog SMTP test server (SMTP 1025, Web UI 8025).
    command: |
      if curl -sf http://localhost:8025/ > /dev/null 2>&1; then
        echo "MailHog is already running."
        exit 0
      fi
      docker rm -f mailhog 2>/dev/null || true
      docker run -d --name mailhog --network host mailhog/mailhog
      echo "Waiting for MailHog..."
      until curl -sf http://localhost:8025/ > /dev/null 2>&1; do
        sleep 1
      done
      echo "MailHog is ready."
    triggeredBy:
      - postDevcontainerStart

  install-deps:
    name: Install dependencies
    description: Download Maven dependencies for the Spring Boot project.
    command: |
      cd MySpring_Boot_aa23v_VotingApp_Final
      chmod +x mvnw
      ./mvnw dependency:resolve -q
    triggeredBy:
      - postDevcontainerStart
    dependsOn:
      - start-mysql

services:
  spring-boot-app:
    name: Spring Boot App
    description: Run the VotingApp Spring Boot dev server on port 8080.
    commands:
      start: |
        cd MySpring_Boot_aa23v_VotingApp_Final
        chmod +x mvnw
        ./mvnw spring-boot:run
      ready: |
        curl -sf http://localhost:8080 || curl -sf -o /dev/null -w "%{http_code}" http://localhost:8080 | grep -q "302\|200\|401\|403"
